<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>AI Agent Company - Pixel Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; overflow: hidden; height: 100vh; }
    #app { display: flex; height: 100vh; }
    #office-area { flex: 1; position: relative; overflow: hidden; background: #1a1a2e; display: flex; flex-direction: column; }
    #canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; cursor: default; }
    #hud {
      position: relative; flex-shrink: 0; padding: 8px 12px;
      background: rgba(0,0,0,0.85); display: flex; justify-content: space-between;
      align-items: center; font-size: 11px; z-index: 10; border-bottom: 2px solid #2DD4BF;
    }
    #canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    .hud-left, .hud-right { display: flex; gap: 16px; align-items: center; }
    .hud-item { display: flex; gap: 4px; align-items: center; }
    .hud-label { color: #2DD4BF; font-weight: bold; font-size: 10px; }
    .hud-val { color: #fff; }
    .conn-badge { padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: bold; }
    .conn-badge.on { background: #065f46; color: #4ADE80; }
    .conn-badge.off { background: #7f1d1d; color: #F87171; }
    #sidebar {

      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel { padding: 10px; border-bottom: 1px solid rgba(45,212,191,0.2); }
    .panel-title { color: #2DD4BF; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .agent-row {
      display: flex; align-items: center; gap: 6px; padding: 4px 6px; margin: 2px 0;
      border-radius: 3px; font-size: 10px; cursor: pointer; transition: background 0.15s;

    .agent-row:hover { background: rgba(45,212,191,0.1); }
    .agent-row.selected { background: rgba(45,212,191,0.15); border-left: 2px solid #2DD4BF; }
    .agent-swatch { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .agent-row-name { flex: 1; }
    .agent-row-status { font-size: 9px; padding: 1px 4px; border-radius: 2px; }

    .st-active { color: #4ADE80; background: rgba(74,222,128,0.15); }
    .st-working { color: #FBBF24; background: rgba(251,191,36,0.15); }
    .st-error { color: #F87171; background: rgba(248,113,113,0.15); }

    .detail-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; }
    .detail-field { font-size: 10px; margin: 3px 0; color: #aaa; }

// Check if any active character is seated adjacent to a PC
function isPcActive(pcCol, pcRow, fpW, fpH) {
  for (const ch of characters.values()) {
    if (!ch.isActive || ch.state !== 'type' || !ch.seatId) continue;
    const seat = seats.get(ch.seatId);
    if (!seat) continue;
    // Check if seat is adjacent to any tile of the PC footprint
    for (let dr = 0; dr < fpH; dr++) {
      for (let dc = 0; dc < fpW; dc++) {
        const fc = pcCol + dc, fr = pcRow + dr;
        if ((Math.abs(seat.col - fc) + Math.abs(seat.row - fr)) === 1) return true;
        if (seat.col === fc && seat.row === fr) return true;
      }
    }
  }
  return false;
}

function addLog(msg, cls = 'i') {

}

// ═══════════════════════════════════════════════════════════════════
// ASSET LOADING — Extract SpriteData from PNGs
// ═══════════════════════════════════════════════════════════════════
function loadImg(src, timeoutMs = 8000) {
  return new Promise((res, rej) => {
    const img = new Image();
    let done = false;
    const timer = setTimeout(() => {
      if (!done) { done = true; rej(new Error('Timeout: ' + src)); }
    }, timeoutMs);
    img.onload = () => { if (!done) { done = true; clearTimeout(timer); res(img); } };
    img.onerror = () => { if (!done) { done = true; clearTimeout(timer); rej(new Error('Failed: ' + src)); } };
    img.src = src;
  });
}

// Extract SpriteData (2D array of hex strings) from an Image
function imgToSprite(img) {
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const d = ctx.getImageData(0, 0, img.width, img.height).data;
  const rows = [];
  for (let y = 0; y < img.height; y++) {
    const row = [];
    for (let x = 0; x < img.width; x++) {
      const i = (y * img.width + x) * 4;
      if (d[i+3] < 128) { row.push(''); }
      else {
        row.push('#' + [d[i],d[i+1],d[i+2]].map(v=>v.toString(16).padStart(2,'0')).join(''));
      }
    }
    rows.push(row);
  }
  return rows; // SpriteData: string[][]
}

// Extract grayscale luminance from floor PNG
function imgToLuminance(img) {
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const d = ctx.getImageData(0, 0, img.width, img.height).data;
  const lum = [];
  for (let i = 0; i < d.length; i += 4) {
    lum.push((0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2]) / 255);
  }
  return { lum, w: img.width, h: img.height };
}

// Extract character frames from sprite sheet (112x96 = 7 frames x 3 directions, each 16x32)
function extractCharFrames(img) {
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0);

  const fw = CHAR_W, fh = CHAR_H; // 16x32
  const result = { down: [], up: [], right: [] };
  const dirKeys = ['down', 'up', 'right'];

  for (let dirIdx = 0; dirIdx < 3; dirIdx++) {
    for (let frame = 0; frame < 7; frame++) {
      const sx = frame * fw, sy = dirIdx * fh;
      const fd = ctx.getImageData(sx, sy, fw, fh).data;
      const rows = [];
      for (let y = 0; y < fh; y++) {
        const row = [];
        for (let x = 0; x < fw; x++) {
          const i = (y * fw + x) * 4;
          if (fd[i+3] < 128) row.push('');
          else row.push('#' + [fd[i],fd[i+1],fd[i+2]].map(v=>v.toString(16).padStart(2,'0')).join(''));
        }
        rows.push(row);
      }
      result[dirKeys[dirIdx]].push(rows);
    }
  }
  return result;
}

// Flip SpriteData horizontally (for LEFT direction from RIGHT)
function flipSprite(sprite) {
  return sprite.map(row => [...row].reverse());
}

// Recursively find all asset entries from a manifest
function flattenManifestAssets(node, parentDir) {
  const results = [];
  if (node.type === 'asset') {
    results.push({ id: node.id, file: node.file || `${node.id}.png`,
      w: node.width, h: node.height, fpW: node.footprintW, fpH: node.footprintH,
      orientation: node.orientation, mirrorSide: node.mirrorSide,
      category: node.category, backgroundTiles: node.backgroundTiles || 0,
      canPlaceOnSurfaces: node.canPlaceOnSurfaces, isDesk: false,
      state: node.state, frame: node.frame, parentDir });
  }
  if (node.members) {
    for (const m of node.members) {
      const sub = flattenManifestAssets(m, parentDir);
      for (const s of sub) {
        if (!s.category && node.category) s.category = node.category;
        if (!s.orientation && node.orientation) s.orientation = node.orientation;
        if (s.mirrorSide === undefined && node.mirrorSide) s.mirrorSide = node.mirrorSide;
        if (!s.backgroundTiles && node.backgroundTiles) s.backgroundTiles = node.backgroundTiles;
      }
      results.push(...sub);
    }
  }
  // Inherit top-level props
  if (node.type === 'group' || !node.type) {
    for (const r of results) {
      if (!r.category && node.category) r.category = node.category;
      if (r.backgroundTiles === undefined) r.backgroundTiles = node.backgroundTiles || 0;
      if (r.canPlaceOnSurfaces === undefined) r.canPlaceOnSurfaces = node.canPlaceOnSurfaces;
      if (node.category === 'desks') r.isDesk = true;
    }
  }
  return results;
}

async function loadAllAssets() {
  addLog('Loading layout...');
  const resp = await fetch('assets/default-layout-1.json');
  if (!resp.ok) throw new Error('Layout fetch failed: ' + resp.status);
  layout = await resp.json();
  addLog(`Layout: ${layout.cols}x${layout.rows}, ${layout.furniture.length} items`);

  // Load floor tiles, characters, and walls IN PARALLEL
  addLog('Loading floor tiles...');
  const floorPromises = [];
  for (let i = 0; i <= 9; i++) {
    floorPromises.push(
      loadImg(`assets/floors/floor_${i}.png`)
        .then(img => { floorCache[i] = imgToLuminance(img); })
        .catch(() => { /* some may not exist */ })
    );
  }

  addLog('Loading characters...');
  const charPromises = [];
  for (let i = 0; i < 6; i++) {
    charPromises.push(
      loadImg(`assets/characters/char_${i}.png`)
        .then(img => { charSprites[i] = extractCharFrames(img); })
        .catch(e => { addLog(`char_${i} failed: ${e.message}`, 'e'); })
    );
  }

  addLog('Loading wall tiles...');
  const wallPromise = loadImg('assets/walls/wall_0.png').then(wallImg => {
    const wallC = document.createElement('canvas');
    wallC.width = wallImg.width; wallC.height = wallImg.height;
    const wallCtx = wallC.getContext('2d');
    wallCtx.drawImage(wallImg, 0, 0);
    const WALL_W = 16, WALL_H = 32, WALL_COLS = 4;
    for (let mask = 0; mask < 16; mask++) {
      const ox = (mask % WALL_COLS) * WALL_W;
      const oy = Math.floor(mask / WALL_COLS) * WALL_H;
      const fd = wallCtx.getImageData(ox, oy, WALL_W, WALL_H).data;
      const rows = [];
      for (let y = 0; y < WALL_H; y++) {
        const row = [];
        for (let x = 0; x < WALL_W; x++) {
          const i = (y * WALL_W + x) * 4;
          if (fd[i+3] < 128) row.push('');
          else row.push('#' + [fd[i],fd[i+1],fd[i+2]].map(v=>v.toString(16).padStart(2,'0')).join(''));
        }
        rows.push(row);
      }
      wallSprites.push(rows);
    }
    addLog(`Loaded ${wallSprites.length} wall pieces`, 's');
  }).catch(e => { addLog('Wall tiles failed: ' + e.message, 'w'); });

  // Wait for ALL base assets in parallel (much faster, won't hang)
  await Promise.all([...floorPromises, ...charPromises, wallPromise]);
  addLog(`Floors: ${Object.keys(floorCache).length}, Chars: ${charSprites.filter(Boolean).length}`, 's');

  // Discover all furniture types needed
  addLog('Loading furniture...');
  const neededTypes = new Set();
  for (const f of layout.furniture) {
    // Type can be "DESK_FRONT", "PC_FRONT_OFF", "WOODEN_CHAIR_SIDE", "SOFA_SIDE:left"
    const baseId = f.type.replace(/:left$/, '');
    neededTypes.add(baseId);
  }

  // Find parent directory for each asset ID — fetch ALL manifests in parallel
  const furnDirs = {};
  const knownDirs = ['BIN','BOOKSHELF','CACTUS','CLOCK','COFFEE','COFFEE_TABLE',
    'CUSHIONED_BENCH','CUSHIONED_CHAIR','DESK','DOUBLE_BOOKSHELF','HANGING_PLANT',
    'LARGE_PAINTING','LARGE_PLANT','PC','PLANT','PLANT_2','POT','SMALL_PAINTING',
    'SMALL_PAINTING_2','SMALL_TABLE','SOFA','TABLE_FRONT','WHITEBOARD','WOODEN_BENCH',
    'WOODEN_CHAIR'];
  await Promise.all(knownDirs.map(async (dir) => {
    try {
      const r = await fetch(`assets/furniture/${dir}/manifest.json`);
      if (r.ok) {
        const m = await r.json();
        const assets = flattenManifestAssets(m, dir);
        for (const a of assets) { furnDirs[a.id] = a; }
        if (m.type === 'asset') {
          furnDirs[m.id] = { id: m.id, file: `${m.id}.png`, w: m.width, h: m.height,
            fpW: m.footprintW, fpH: m.footprintH, category: m.category,
            backgroundTiles: m.backgroundTiles || 0, parentDir: dir,
            canPlaceOnSurfaces: m.canPlaceOnSurfaces, isDesk: m.category === 'desks' };
        }
      }
    } catch(e) { /* dir may not exist */ }
  }));
  addLog(`Discovered ${Object.keys(furnDirs).length} furniture assets`, 'i');

  // Load PNG for each needed asset — IN PARALLEL
  const furnLoadPromises = [];
  for (const assetId of neededTypes) {
    const entry = furnDirs[assetId];
    if (!entry) { addLog(`No manifest entry for ${assetId}`, 'w'); continue; }
    furnLoadPromises.push(
      loadImg(`assets/furniture/${entry.parentDir}/${entry.file || assetId + '.png'}`)
        .then(img => {
          const sprite = imgToSprite(img);
          furnSprites[assetId] = {
            data: sprite, w: img.width, h: img.height,
            fpW: entry.fpW || Math.ceil(img.width / TILE),
            fpH: entry.fpH || Math.ceil(img.height / TILE),
            category: entry.category, orientation: entry.orientation,
            backgroundTiles: entry.backgroundTiles || 0,
            isDesk: entry.isDesk, canPlaceOnSurfaces: entry.canPlaceOnSurfaces,
            mirrorSide: entry.mirrorSide
          };
        })
        .catch(e => { addLog(`Furniture ${assetId}: ${e.message}`, 'w'); })
    );
  }

  // Load PC ON animation frames in parallel too
  const pcOnIds = ['PC_FRONT_ON_1','PC_FRONT_ON_2','PC_FRONT_ON_3'];
  const pcOnSprites = [];
  const pcPromises = pcOnIds.map((pid, idx) =>
    loadImg(`assets/furniture/PC/${pid}.png`)
      .then(img => { pcOnSprites[idx] = imgToSprite(img); })
      .catch(() => {})
  );

  await Promise.all([...furnLoadPromises, ...pcPromises]);
  const filteredPcOn = pcOnSprites.filter(Boolean);
  if (filteredPcOn.length > 0) pcOnFrames['PC_FRONT'] = filteredPcOn;

  addLog(`Loaded ${Object.keys(furnSprites).length} furniture sprites`, 's');
}

// ═══════════════════════════════════════════════════════════════════
// COLORIZE — HSL floor tile colorization (Photoshop-style)
// ═══════════════════════════════════════════════════════════════════
function hslToHex(h, s, l) {
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const hp = h / 60;
  const x = c * (1 - Math.abs((hp % 2) - 1));
  let r1=0, g1=0, b1=0;
  if (hp < 1) { r1=c; g1=x; }
  else if (hp < 2) { r1=x; g1=c; }
  else if (hp < 3) { g1=c; b1=x; }
  else if (hp < 4) { g1=x; b1=c; }
  else if (hp < 5) { r1=x; b1=c; }
  else { r1=c; b1=x; }
  const m = l - c/2;
  const toHex = v => Math.max(0, Math.min(255, Math.round((v+m)*255))).toString(16).padStart(2,'0');
  return '#' + toHex(r1) + toHex(g1) + toHex(b1);
}

function colorizeFloorTile(tileType, color) {
  const key = `floor-${tileType}-${color?.h}-${color?.s}-${color?.b}-${color?.c}`;
  if (spriteCanvasCache.has(key)) return spriteCanvasCache.get(key);

  // Tile type 1 → floor_0.png, type 7 → floor_6.png, etc. (patternIndex - 1)
  const floor = floorCache[tileType - 1];
  if (!floor || !color) return null;
  const { lum, w, h } = floor;
  const { h: hue, s, b, c: contrast } = color;

  const offC = document.createElement('canvas');
  offC.width = w * ZOOM; offC.height = h * ZOOM;
  const ctx = offC.getContext('2d');

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      let L = lum[y * w + x];
      if (contrast !== 0) L = 0.5 + (L - 0.5) * (100 + contrast) / 100;
      if (b !== 0) L += b / 200;
      L = Math.max(0, Math.min(1, L));
      ctx.fillStyle = hslToHex(hue, s / 100, L);
      ctx.fillRect(x * ZOOM, y * ZOOM, ZOOM, ZOOM);
    }
  }
  spriteCanvasCache.set(key, offC);
  return offC;
}

// Colorize a wall SpriteData using HSL (grayscale → color, like floor tiles)
function colorizeWallSprite(sprite, color) {
  const h = sprite.length, w = sprite[0]?.length || 0;
  const c = document.createElement('canvas');
  c.width = w * ZOOM; c.height = h * ZOOM;
  const ctx = c.getContext('2d');
  const { h: hue, s, b, c: contrast } = color;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const px = sprite[y][x];
      if (!px) continue;
      // Convert hex to luminance
      const r = parseInt(px.substring(1,3),16)/255;
      const g = parseInt(px.substring(3,5),16)/255;
      const bl = parseInt(px.substring(5,7),16)/255;
      let L = 0.299 * r + 0.587 * g + 0.114 * bl;
      if (contrast) L = 0.5 + (L - 0.5) * (100 + contrast) / 100;
      if (b) L += b / 200;
      // Keep minimum brightness for wall texture visibility
      L = Math.max(0.08, Math.min(1, L));
      ctx.fillStyle = hslToHex(hue, s / 100, L);
      ctx.fillRect(x * ZOOM, y * ZOOM, ZOOM, ZOOM);
    }
  }
  return c;
}

// ═══════════════════════════════════════════════════════════════════
// SPRITE CANVAS CACHE — render SpriteData to offscreen canvas
// ═══════════════════════════════════════════════════════════════════
function getSpriteCanvas(sprite, cacheKey) {
  if (!cacheKey) cacheKey = sprite;
  if (spriteCanvasCache.has(cacheKey)) return spriteCanvasCache.get(cacheKey);

  const h = sprite.length, w = sprite[0]?.length || 0;
  const c = document.createElement('canvas');
  c.width = w * ZOOM; c.height = h * ZOOM;
  const ctx = c.getContext('2d');
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const px = sprite[y][x];
      if (px) { ctx.fillStyle = px; ctx.fillRect(x * ZOOM, y * ZOOM, ZOOM, ZOOM); }
    }
  }
  spriteCanvasCache.set(cacheKey, c);
  return c;
}

// ═══════════════════════════════════════════════════════════════════
// TILE MAP + PATHFINDING
// ═══════════════════════════════════════════════════════════════════
function buildTileGrid() {
  tileGrid = [];
  let minR = layout.rows, maxR = 0, minC = layout.cols, maxC = 0;
  for (let r = 0; r < layout.rows; r++) {
    const row = [];
    for (let c = 0; c < layout.cols; c++) {
      const t = layout.tiles[r * layout.cols + c];
      row.push(t);
      if (t !== 255) { // non-VOID
        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
        minC = Math.min(minC, c); maxC = Math.max(maxC, c);
      }
    }
    tileGrid.push(row);
  }
  visibleBounds = { minC, maxC, minR, maxR };
  addLog(`Visible area: col[${minC}..${maxC}] row[${minR}..${maxR}] = ${maxC-minC+1}x${maxR-minR+1} tiles`);
}

function buildSeatsAndBlocked() {
  blockedTiles = new Set();
  seats = new Map();

  // Build desk tiles set for seat facing detection
  // Only real work desks count (DESK_*, TABLE_FRONT), NOT coffee tables or small tables
  const WORK_DESK_TYPES = ['DESK_FRONT','DESK_SIDE','TABLE_FRONT','TABLE_SIDE'];
  const deskTiles = new Set();
  for (const item of layout.furniture) {
    const baseId = item.type.replace(/:left$/, '');
    const info = furnSprites[baseId];
    if (!info || !info.isDesk) continue;
    if (!WORK_DESK_TYPES.includes(baseId)) continue; // skip coffee tables etc.
    for (let dr = 0; dr < info.fpH; dr++)
      for (let dc = 0; dc < info.fpW; dc++)
        deskTiles.add(`${item.col+dc},${item.row+dr}`);
  }

  for (const item of layout.furniture) {
    const baseId = item.type.replace(/:left$/, '');
    const info = furnSprites[baseId];
    if (!info) continue;
    const bgRows = info.backgroundTiles || 0;

    // Add blocked tiles (skip background rows)
    for (let dr = 0; dr < info.fpH; dr++) {
      if (dr < bgRows) continue;
      for (let dc = 0; dc < info.fpW; dc++)
        blockedTiles.add(`${item.col+dc},${item.row+dr}`);
    }

    // Create seats from chairs
    if (info.category === 'chairs') {
      // Check if this chair is adjacent to a desk (= work station)
      let isWorkSeat = false;
      for (let dr = bgRows; dr < info.fpH; dr++) {
        for (let dc = 0; dc < info.fpW; dc++) {
          const sc = item.col+dc, sr = item.row+dr;
          if (deskTiles.has(`${sc},${sr-1}`) || deskTiles.has(`${sc},${sr+1}`) ||
              deskTiles.has(`${sc-1},${sr}`) || deskTiles.has(`${sc+1},${sr}`)) {
            isWorkSeat = true;
          }
        }
      }
      // Only create 1 seat per chair (first non-bg tile), not per tile of footprint
      const sc = item.col, sr = item.row + bgRows;
      let facingDir = DIR.DOWN;
      const orient = info.orientation;
      if (orient === 'front') facingDir = DIR.DOWN;
      else if (orient === 'back') facingDir = DIR.UP;
      else if (orient === 'side') {
        facingDir = item.type.endsWith(':left') ? DIR.LEFT : DIR.RIGHT;
      } else {
        if (deskTiles.has(`${sc},${sr-1}`)) facingDir = DIR.UP;
        else if (deskTiles.has(`${sc},${sr+1}`)) facingDir = DIR.DOWN;
        else if (deskTiles.has(`${sc-1},${sr}`)) facingDir = DIR.LEFT;
        else if (deskTiles.has(`${sc+1},${sr}`)) facingDir = DIR.RIGHT;
      }
      seats.set(item.uid, { col: sc, row: sr, facingDir, assigned: false, isWork: isWorkSeat });
    }
  }

  // Build walkable tiles
  walkableTiles = [];
  for (let r = 0; r < layout.rows; r++) {
    for (let c = 0; c < layout.cols; c++) {
      if (isWalkable(c, r)) walkableTiles.push({ col: c, row: r });
    }
  }
}

function isWalkable(col, row) {
  if (col < 0 || col >= layout.cols || row < 0 || row >= layout.rows) return false;
  const t = tileGrid[row][col];
  if (t === 0 || t === 255) return false; // WALL or VOID
  if (blockedTiles.has(`${col},${row}`)) return false;
  return true;
}

function findPath(sc, sr, ec, er, allowBlockedDest = false) {
  if (sc === ec && sr === er) return [];
  const key = (c,r) => `${c},${r}`;
  const startKey = key(sc,sr), endKey = key(ec,er);
  // Allow blocked destination for seats (chairs are blocked tiles but characters need to walk to them)
  if (!allowBlockedDest && !isWalkable(ec, er)) return [];
  // Even with allowBlockedDest, destination must be a valid floor tile
  if (allowBlockedDest) {
    if (ec < 0 || ec >= layout.cols || er < 0 || er >= layout.rows) return [];
    const t = tileGrid[er]?.[ec];
    if (t === 0 || t === 255) return []; // WALL or VOID
  }
  const visited = new Set([startKey]);
  const parent = new Map();
  const queue = [{col:sc,row:sr}];
  const dirs = [{dc:0,dr:-1},{dc:0,dr:1},{dc:-1,dr:0},{dc:1,dr:0}];
  while (queue.length > 0) {
    const cur = queue.shift();
    const ck = key(cur.col, cur.row);
    if (ck === endKey) {
      const path = [];
      let k = endKey;
      while (k !== startKey) { const [c,r]=k.split(',').map(Number); path.unshift({col:c,row:r}); k=parent.get(k); }
      return path;
    }
    for (const d of dirs) {
      const nc=cur.col+d.dc, nr=cur.row+d.dr, nk=key(nc,nr);
      // Allow walking TO the destination tile even if it's blocked (for seats)
      const walkable = isWalkable(nc,nr) || (allowBlockedDest && nc === ec && nr === er);
      if (!visited.has(nk) && walkable) { visited.add(nk); parent.set(nk,ck); queue.push({col:nc,row:nr}); }
    }
  }
  return [];
}

function dirBetween(fc, fr, tc, tr) {
  const dc=tc-fc, dr=tr-fr;
  if (dc > 0) return DIR.RIGHT;
  if (dc < 0) return DIR.LEFT;
  if (dr > 0) return DIR.DOWN;
  return DIR.UP;
}

// ═══════════════════════════════════════════════════════════════════
// CHARACTER CLASS
// ═══════════════════════════════════════════════════════════════════
class Character {
  constructor(id, palette, seatId, seat) {
    this.id = id;
    this.palette = palette % charSprites.length;
    this.state = 'type'; // idle | walk | type
    this.dir = seat ? seat.facingDir : DIR.DOWN;
    const pos = seat ? tileCenter(seat.col, seat.row) : tileCenter(1, 11);
    this.x = pos.x; this.y = pos.y;
    this.tileCol = seat ? seat.col : 1;
    this.tileRow = seat ? seat.row : 11;
    this.path = [];
    this.moveProgress = 0;
    this.frame = 0;
    this.frameTimer = 0;
    this.wanderTimer = rand(WANDER_PAUSE_MIN, WANDER_PAUSE_MAX);
    this.wanderCount = 0;
    this.wanderLimit = randInt(WANDER_MOVES_MIN, WANDER_MOVES_MAX);
    this.isActive = false;
    this.seatId = seatId;
    this.seatTimer = seat ? rand(SEAT_REST_MIN, SEAT_REST_MAX) : 0; // start seated
    this.currentTool = null;
    // Speech bubbles
    this.bubbleType = null;     // 'permission' | 'waiting' | null
    this.bubbleTimer = 0;
    // Matrix effect
    this.matrixEffect = 'spawn'; // spawn | despawn | null
    this.matrixTimer = 0;
    this.matrixSeeds = Array.from({length:CHAR_W}, () => Math.random());
  }

  getSprite() {
    const cs = charSprites[this.palette];
    if (!cs) return null;
    const dirKey = this.dir === DIR.DOWN ? 'down' : this.dir === DIR.UP ? 'up' : 'right';
    const isLeft = this.dir === DIR.LEFT;
    const frames = cs[isLeft ? 'right' : dirKey];
    if (!frames) return null;

    let sprite;
    if (this.state === 'type') {
      // frames[3], frames[4] = typing; frames[5], frames[6] = reading
      const isReading = this.currentTool && ['Read','Grep','Glob','WebFetch','WebSearch'].includes(this.currentTool);
      const base = isReading ? 5 : 3;
      sprite = frames[base + (this.frame % 2)];
    } else if (this.state === 'walk') {
      // Walk: frames 0,1,2,1 pattern
      const walkPattern = [0,1,2,1];
      sprite = frames[walkPattern[this.frame % 4]];
    } else { // idle
      sprite = frames[1]; // standing still frame
    }
    return isLeft ? flipSprite(sprite) : sprite;
  }

  update(dt) {
    this.frameTimer += dt;

    // Matrix effect
    if (this.matrixEffect) {
      this.matrixTimer += dt;
      if (this.matrixTimer >= MATRIX_DUR) {
        if (this.matrixEffect === 'spawn') {
          this.matrixEffect = null;
          this.matrixTimer = 0;
        }
        // despawn would remove character
      }
      return; // skip FSM during effect
    }

    switch (this.state) {
      case 'type':
        if (this.frameTimer >= TYPE_FRAME_DUR) {
          this.frameTimer -= TYPE_FRAME_DUR;
          this.frame = (this.frame + 1) % 2;
        }
        if (!this.isActive) {
          // Not working — release seat, stand up, go wander
          releaseWorkSeat(this);
          this.state = 'idle';
          this.frame = 0; this.frameTimer = 0;
          this.wanderTimer = rand(0.5, 2.0);
          this.wanderCount = 0;
          this.wanderLimit = randInt(WANDER_MOVES_MIN, WANDER_MOVES_MAX);
        }
        break;

      case 'idle':
        this.frame = 0;
        if (this.isActive) {
          // Try to claim a seat if we don't have one
          if (!this.seatId) claimWorkSeat(this);
          if (this.seatId) {
            this._pathToSeat();
            break;
          }
          // No seat available — keep wandering until one frees up
        }
        this.wanderTimer -= dt;
        if (this.wanderTimer <= 0) {
          if (this.isActive && this.seatId) {
            this._pathToSeat();
          } else if (walkableTiles.length > 0) {
            const t = walkableTiles[Math.floor(Math.random() * walkableTiles.length)];
            const p = findPath(this.tileCol, this.tileRow, t.col, t.row);
            if (p.length > 0) {
              this.path = p; this.moveProgress = 0;
              this.state = 'walk'; this.frame = 0; this.frameTimer = 0;
              this.wanderCount++;
            }
          }
          this.wanderTimer = rand(WANDER_PAUSE_MIN, WANDER_PAUSE_MAX);
        }
        break;

      case 'walk':
        if (this.frameTimer >= WALK_FRAME_DUR) {
          this.frameTimer -= WALK_FRAME_DUR;
          this.frame = (this.frame + 1) % 4;
        }
        if (this.path.length === 0) {
          this._arriveAtEnd();
          break;
        }
        const next = this.path[0];
        this.dir = dirBetween(this.tileCol, this.tileRow, next.col, next.row);
        this.moveProgress += (WALK_SPEED / TILE) * dt;
        const from = tileCenter(this.tileCol, this.tileRow);
        const to = tileCenter(next.col, next.row);
        const t = Math.min(this.moveProgress, 1);
        this.x = from.x + (to.x - from.x) * t;
        this.y = from.y + (to.y - from.y) * t;
        if (this.moveProgress >= 1) {
          this.tileCol = next.col; this.tileRow = next.row;
          this.x = to.x; this.y = to.y;
          this.path.shift(); this.moveProgress = 0;
        }
        // Repath to seat if became active while walking elsewhere
        if (this.isActive && this.seatId) {
          const seat = seats.get(this.seatId);
          if (seat) {
            const last = this.path[this.path.length - 1];
            if (!last || last.col !== seat.col || last.row !== seat.row) {
              const np = findPath(this.tileCol, this.tileRow, seat.col, seat.row, true);
              if (np.length > 0) { this.path = np; this.moveProgress = 0; }
            }
          }
        }
        break;
    }
  }

  _pathToSeat() {
    if (!this.seatId) { this.state = 'type'; this.frame = 0; this.frameTimer = 0; return; }
    const seat = seats.get(this.seatId);
    if (!seat) return;
    // Use allowBlockedDest=true because seat tiles are furniture-blocked
    const p = findPath(this.tileCol, this.tileRow, seat.col, seat.row, true);
    if (p.length > 0) {
      this.path = p; this.moveProgress = 0;
      this.state = 'walk'; this.frame = 0; this.frameTimer = 0;
    } else {
      // Teleport to seat if path still fails (e.g. completely surrounded)
      const pos = tileCenter(seat.col, seat.row);
      this.x = pos.x; this.y = pos.y;
      this.tileCol = seat.col; this.tileRow = seat.row;
      this.state = 'type'; this.dir = seat.facingDir;
      this.frame = 0; this.frameTimer = 0;
    }
  }

  _arriveAtEnd() {
    const c = tileCenter(this.tileCol, this.tileRow);
    this.x = c.x; this.y = c.y;
    if (this.isActive && this.seatId) {
      const seat = seats.get(this.seatId);
      if (seat && this.tileCol === seat.col && this.tileRow === seat.row) {
        this.state = 'type'; this.dir = seat.facingDir;
      } else {
        // Arrived somewhere but not at seat — repath
        this._pathToSeat();
        return;
      }
    } else {
      // Not active or no seat — wander
      this.state = 'idle';
      this.wanderTimer = rand(WANDER_PAUSE_MIN, WANDER_PAUSE_MAX);
    }
    this.frame = 0; this.frameTimer = 0;
  }
}

// ═══════════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════════
function renderFrame(ctx, canvasW, canvasH) {
  ctx.clearRect(0, 0, canvasW, canvasH);
  if (!layout) return;

  // Compute visible content area (exclude VOID tiles) — no padding for tight fit
  const vb = visibleBounds;
  const vMinC = vb.minC;
  const vMaxC = vb.maxC;
  const vMinR = vb.minR;
  const vMaxR = vb.maxR;
  const visW = (vMaxC - vMinC + 1) * TILE * ZOOM;
  const visH = (vMaxR - vMinR + 1) * TILE * ZOOM;

  // Scale to FIT canvas (show entire map, may have minor bars)
  const fitScale = Math.min(canvasW / visW, canvasH / visH);
  const scaledW = visW * fitScale;
  const scaledH = visH * fitScale;
  const offX = Math.floor((canvasW - scaledW) / 2);
  const offY = Math.floor((canvasH - scaledH) / 2);
  ctx.save();
  ctx.translate(offX, offY);
  ctx.scale(fitScale, fitScale);
  // Shift so visible area starts at origin
  const ox = -vMinC * TILE * ZOOM;
  const oy = -vMinR * TILE * ZOOM;

  // 1. TILES (floors only — walls drawn as z-sorted sprites)
  for (let r = 0; r < layout.rows; r++) {
    for (let c = 0; c < layout.cols; c++) {
      const tile = tileGrid[r][c];
      if (tile === 255) continue; // VOID
      const sx = ox + c * TILE * ZOOM;
      const sy = oy + r * TILE * ZOOM;
      if (tile === 0) { // WALL — draw base color, then z-sorted sprite overlay
        const ci = r * layout.cols + c;
        const wc = layout.tileColors?.[ci];
        if (wc) {
          // Use a minimum lightness of 0.12 for wall base so walls are visible
          let wL = 0.5;
          if (wc.c !== 0) wL = 0.5 + (wL - 0.5) * (100 + wc.c) / 100;
          if (wc.b !== 0) wL += wc.b / 200;
          wL = Math.max(0.12, Math.min(1, wL));
          ctx.fillStyle = hslToHex(wc.h, wc.s/100, wL);
        } else {
          ctx.fillStyle = WALL_COLOR;
        }
        ctx.fillRect(sx, sy, TILE * ZOOM, TILE * ZOOM);
      } else if (tile >= 1 && tile <= 9) {
        const ci = r * layout.cols + c;
        const color = layout.tileColors?.[ci];
        if (color && floorCache[tile - 1]) {
          const fc = colorizeFloorTile(tile, color);
          if (fc) { ctx.drawImage(fc, sx, sy); continue; }
        }
        ctx.fillStyle = FALLBACK_FLOOR;
        ctx.fillRect(sx, sy, TILE * ZOOM, TILE * ZOOM);
      }
    }
  }

  // 2. Z-SORTED SCENE (furniture + characters)
  const drawables = [];

  // Wall auto-tiling sprites (z-sorted)
  if (wallSprites.length === 16) {
    for (let r = 0; r < layout.rows; r++) {
      for (let c = 0; c < layout.cols; c++) {
        if (tileGrid[r][c] !== 0) continue; // not a wall
        let mask = 0;
        if (r > 0 && tileGrid[r-1][c] === 0) mask |= 1; // N
        if (c < layout.cols-1 && tileGrid[r][c+1] === 0) mask |= 2; // E
        if (r < layout.rows-1 && tileGrid[r+1][c] === 0) mask |= 4; // S
        if (c > 0 && tileGrid[r][c-1] === 0) mask |= 8; // W
        const ws = wallSprites[mask];
        if (!ws) continue;
        const ci = r * layout.cols + c;
        const wc = layout.tileColors?.[ci];
        const wallZY = (r + 1) * TILE;
        const wallPx = c * TILE;
        const wallPy = r * TILE + (TILE - ws.length); // anchor bottom
        drawables.push({ zY: wallZY, draw: () => {
          const ck = wc ? `wall-${mask}-${wc.h}-${wc.s}-${wc.b}` : `wall-${mask}`;
          let cached;
          if (wc) {
            // Colorize wall sprite like floor
            cached = spriteCanvasCache.get(ck);
            if (!cached) {
              cached = colorizeWallSprite(ws, wc);
              spriteCanvasCache.set(ck, cached);
            }
          } else {
            cached = getSpriteCanvas(ws, ck);
          }
          ctx.drawImage(cached, ox + wallPx * ZOOM, oy + wallPy * ZOOM);
        }});
      }
    }
  }

  // Build desk surface z-map for items placed on desks (PCs, coffee, etc.)
  const surfaceZMap = new Map(); // "col,row" → zY of the desk at that position
  for (const item of layout.furniture) {
    const baseId = item.type.replace(/:left$/, '');
    const info = furnSprites[baseId];
    if (!info || !info.isDesk) continue;
    const deskZY = item.row * TILE + (info.data?.length || info.fpH * TILE);
    for (let dr = 0; dr < info.fpH; dr++)
      for (let dc = 0; dc < info.fpW; dc++)
        surfaceZMap.set(`${item.col+dc},${item.row+dr}`, deskZY);
  }

  // Furniture (with PC on/off animation)
  for (const item of layout.furniture) {
    const baseId = item.type.replace(/:left$/, '');
    const info = furnSprites[baseId];
    if (!info) continue;
    let sprite = info.data;

    // PC ON animation: swap sprite if adjacent seat has active agent
    if (baseId === 'PC_FRONT_OFF' && pcOnFrames['PC_FRONT']) {
      const pcActive = isPcActive(item.col, item.row, info.fpW, info.fpH);
      if (pcActive) {
        const animFrame = Math.floor(furnAnimTimer / FURN_ANIM_INT) % pcOnFrames['PC_FRONT'].length;
        sprite = pcOnFrames['PC_FRONT'][animFrame];
      }
    }

    const px = item.col * TILE;
    const py = item.row * TILE;
    const spriteH = sprite.length;
    let zY = py + spriteH;

    // Surface items (PCs, coffee on desks): use parent desk's zY so they render on top
    if (info.canPlaceOnSurfaces) {
      const deskZ = surfaceZMap.get(`${item.col},${item.row}`);
      if (deskZ !== undefined) zY = deskZ + 1; // +1 ensures it draws after the desk
    }

    // Chair z-sorting
    if (info.category === 'chairs') {
      if (info.orientation === 'back') {
        zY = (item.row + info.fpH) * TILE + 1;
      } else {
        zY = (item.row + 1) * TILE;
      }
    }

    const mirrored = item.type.endsWith(':left') && info.mirrorSide;
    const isAnimPC = baseId === 'PC_FRONT_OFF' && sprite !== info.data;
    const animFrame = isAnimPC ? Math.floor(furnAnimTimer / FURN_ANIM_INT) % 3 : 0;
    const ck = isAnimPC ? `furn-PC_ON-${animFrame}` : `furn-${baseId}-${mirrored?'m':'n'}`;

    drawables.push({ zY, draw: () => {
      let cached = getSpriteCanvas(sprite, ck);
      const dx = ox + px * ZOOM;
      const dy = oy + py * ZOOM;
      if (mirrored) {
        ctx.save();
        ctx.translate(dx + cached.width, dy);
        ctx.scale(-1, 1);
        ctx.drawImage(cached, 0, 0);
        ctx.restore();
      } else {
        ctx.drawImage(cached, dx, dy);
      }
    }});
  }

  // Characters
  for (const ch of characters.values()) {
    const sitOff = ch.state === 'type' ? CHAR_SIT_OFFSET : 0;
    const charZY = ch.y + TILE / 2 + CHAR_Z_OFFSET;

    drawables.push({ zY: charZY, draw: () => {
      if (ch.matrixEffect) {
        renderMatrixEffect(ctx, ch, ox, oy);
        return;
      }
      const sprite = ch.getSprite();
      if (!sprite) return;
      const ck = `char-${ch.palette}-${ch.dir}-${ch.state}-${ch.frame}-${ch.currentTool||''}`;
      const cached = getSpriteCanvas(sprite, ck);
      const drawX = Math.round(ox + ch.x * ZOOM - cached.width / 2);
      const drawY = Math.round(oy + (ch.y + sitOff) * ZOOM - cached.height);
      ctx.drawImage(cached, drawX, drawY);

      // Draw speech bubble above character
      if (ch.bubbleType) {
        const bubbleSprite = ch.bubbleType === 'permission' ? BUBBLE_PERMISSION : BUBBLE_WAITING;
        const bck = `bubble-${ch.bubbleType}`;
        const bubbleCached = getSpriteCanvas(bubbleSprite, bck);
        const bx = drawX + (cached.width - bubbleCached.width) / 2;
        const by = drawY - bubbleCached.height + BUBBLE_OFFSET_Y * ZOOM;
        ctx.drawImage(bubbleCached, Math.round(bx), Math.round(by));
      }
    }});
  }

  // Sort + draw
  drawables.sort((a, b) => a.zY - b.zY);
  for (const d of drawables) d.draw();

  // 3. NAME LABELS — draw on top of everything
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  for (const ch of characters.values()) {
    if (ch.matrixEffect) continue; // skip during spawn
    const name = AGENT_NAMES[ch.id];
    if (!name) continue;
    const sitOff = ch.state === 'type' ? CHAR_SIT_OFFSET : 0;
    const labelX = ox + ch.x * ZOOM;
    const labelY = oy + (ch.y + sitOff) * ZOOM - CHAR_H * ZOOM - 6;
    // Background pill
    ctx.font = 'bold 8px "Courier New", monospace';
    const tw = ctx.measureText(name).width;
    const pw = tw + 8, ph = 12;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    const rx = labelX - pw/2, ry = labelY - ph;
    if (ctx.roundRect) {
      ctx.beginPath(); ctx.roundRect(rx, ry, pw, ph, 3); ctx.fill();
    } else {
      ctx.fillRect(rx, ry, pw, ph);
    }
    // Colored text
    ctx.fillStyle = AGENT_COLORS[ch.id] || '#fff';
    ctx.fillText(name, labelX, labelY - 2);
  }

  ctx.restore(); // restore the translate+scale transform
}

// ═══════════════════════════════════════════════════════════════════
// MATRIX EFFECT
// ═══════════════════════════════════════════════════════════════════
function renderMatrixEffect(ctx, ch, offX, offY) {
  const sprite = ch.getSprite();
  if (!sprite) return;
  const progress = ch.matrixTimer / MATRIX_DUR;
  const isSpawn = ch.matrixEffect === 'spawn';
  const totalSweep = CHAR_H + MATRIX_TRAIL;
  const sitOff = ch.state === 'type' ? CHAR_SIT_OFFSET : 0;
  const baseX = Math.round(offX + ch.x * ZOOM - (CHAR_W * ZOOM) / 2);
  const baseY = Math.round(offY + (ch.y + sitOff) * ZOOM - CHAR_H * ZOOM);

  for (let col = 0; col < CHAR_W; col++) {
    const stagger = (ch.matrixSeeds[col] || 0) * MATRIX_STAGGER;
    const colProg = Math.max(0, Math.min(1, (progress - stagger) / (1 - MATRIX_STAGGER)));
    const headRow = colProg * totalSweep;

    for (let row = 0; row < CHAR_H; row++) {
      const pixel = sprite[row]?.[col];
      const hasPixel = pixel && pixel !== '';
      const dist = headRow - row;
      const px = baseX + col * ZOOM;
      const py = baseY + row * ZOOM;

      if (isSpawn) {
        if (dist < 0) continue;
        if (dist < 1) {
          ctx.fillStyle = MATRIX_HEAD;
          ctx.fillRect(px, py, ZOOM, ZOOM);
        } else if (dist < MATRIX_TRAIL) {
          const tp = dist / MATRIX_TRAIL;
          if (hasPixel) {
            ctx.fillStyle = pixel;
            ctx.fillRect(px, py, ZOOM, ZOOM);
            ctx.globalAlpha = (1 - tp) * 0.6;
            ctx.fillStyle = `rgba(0,255,65,1)`;
            ctx.fillRect(px, py, ZOOM, ZOOM);
            ctx.globalAlpha = 1;
          } else {
            ctx.globalAlpha = (1 - tp) * 0.5;
            ctx.fillStyle = tp < 0.33 ? 'rgba(0,255,65,1)' : tp < 0.66 ? 'rgba(0,170,40,1)' : 'rgba(0,85,20,1)';
            ctx.fillRect(px, py, ZOOM, ZOOM);
            ctx.globalAlpha = 1;
          }
        } else {
          if (hasPixel) { ctx.fillStyle = pixel; ctx.fillRect(px, py, ZOOM, ZOOM); }
        }
      } else { // despawn
        if (dist < 0) {
          if (hasPixel) { ctx.fillStyle = pixel; ctx.fillRect(px, py, ZOOM, ZOOM); }
        } else if (dist < 1) {
          ctx.fillStyle = MATRIX_HEAD;
          ctx.fillRect(px, py, ZOOM, ZOOM);
        } else if (dist < MATRIX_TRAIL) {
          const tp = dist / MATRIX_TRAIL;
          ctx.globalAlpha = (1 - tp) * 0.5;
          ctx.fillStyle = tp < 0.33 ? 'rgba(0,255,65,1)' : 'rgba(0,170,40,1)';
          ctx.fillRect(px, py, ZOOM, ZOOM);
          ctx.globalAlpha = 1;
        }
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// INITIALIZE AGENTS + SEATS (Dynamic Work Seat Assignment)
// ═══════════════════════════════════════════════════════════════════
// Only 3 work seats exist (adjacent to desks with PCs).
// When an agent becomes active, it claims a free work seat, walks to
// it, sits down facing the computer (which lights up).
// When the agent finishes, it releases the seat and wanders.
// Non-work chairs (lounge, meeting) are never assigned.

const MAX_WORK_SEATS = 3;
let workSeats = [];  // [{seatId, seat}] — only the 3 desk seats

function initAgents() {
  // Identify work seats (chairs adjacent to desks) — pick first 3
  workSeats = Array.from(seats.entries())
    .filter(([, s]) => s.isWork)
    .slice(0, MAX_WORK_SEATS)
    .map(([seatId, seat]) => ({ seatId, seat }));

  // Mark all seats as unassigned
  for (const [, s] of seats) s.assigned = false;

  for (let i = 0; i < 10; i++) {
    const name = AGENT_NAMES[i];
    // No seat assigned at init — all agents start wandering
    const ch = new Character(i, i, null, null);
    ch.isActive = false;
    if (walkableTiles.length > 0) {
      const wt = walkableTiles[Math.floor(Math.random() * walkableTiles.length)];
      const pos = tileCenter(wt.col, wt.row);
      ch.x = pos.x; ch.y = pos.y;
      ch.tileCol = wt.col; ch.tileRow = wt.row;
      ch.state = 'idle';
      ch.wanderTimer = rand(1.0, 5.0);
      ch.matrixEffect = null;
    }
    characters.set(i, ch);
    agentData[name] = { status: 'idle', task: null, skills: [], ram_mb: 0 };
  }
  addLog(`Initialized ${characters.size} agents, ${workSeats.length} work seats (max ${MAX_WORK_SEATS} concurrent)`, 's');
}

function claimWorkSeat(ch) {
  if (ch.seatId) return true; // already has a seat
  for (const ws of workSeats) {
    if (!ws.seat.assigned) {
      ws.seat.assigned = true;
      ch.seatId = ws.seatId;
      return true;
    }
  }
  return false; // all 3 seats occupied
}

function releaseWorkSeat(ch) {
  if (!ch.seatId) return;
  for (const ws of workSeats) {
    if (ws.seatId === ch.seatId) {
      ws.seat.assigned = false;
      break;
    }
  }
  ch.seatId = null;
}

// ═══════════════════════════════════════════════════════════════════
// WEBSOCKET — real data only
// ═══════════════════════════════════════════════════════════════════
function connectWS() {
  const port = parseInt(location.port || '9800') + 1;
  const url = `ws://${location.hostname || 'localhost'}:${port}`;
  let ws;
  try { ws = new WebSocket(url); } catch(e) { addLog('WS connect failed', 'e'); setTimeout(connectWS, 3000); return; }

  ws.onopen = () => {
    wsConnected = true;
    document.getElementById('conn-badge').className = 'conn-badge on';
    document.getElementById('conn-badge').textContent = 'ONLINE';
    addLog('Connected to server', 's');
  };

  ws.onmessage = (ev) => {
    try {
      const data = JSON.parse(ev.data);
      if (data.type === 'full_state' && data.agents) {
        let activeCount = 0;
        let errorCount = 0;
        for (const [name, info] of Object.entries(data.agents)) {
          const idx = AGENT_NAMES.indexOf(name);
          if (idx < 0) continue;
          const prevInfo = agentData[name] || {};
          agentData[name] = info;
          const ch = characters.get(idx);
          if (!ch) continue;
          const wasActive = ch.isActive;
          const prevStatus = prevInfo.status || 'idle';
          const nowActive = info.status === 'working' || info.status === 'active';
          const nowError = info.status === 'error';
          ch.currentTool = info.current_tool || null;
          if (nowActive) activeCount++;
          if (nowError) errorCount++;

          // ─── DYNAMIC SEAT ASSIGNMENT ───
          if (!wasActive && nowActive) {
            // Agent just started working → claim a free work seat
            ch.isActive = true;
            if (claimWorkSeat(ch)) {
              ch._pathToSeat();
            }
            addLog(`${name} started working` + (info.task ? ` [${info.task}]` : ''), 'i');
          } else if (wasActive && !nowActive) {
            // Agent finished → release seat, go wander
            ch.isActive = false;
            releaseWorkSeat(ch);
            if (!nowError) addLog(`${name} finished` + (info.task ? ` [${info.task}]` : ''), 's');
          } else {
            ch.isActive = nowActive;
          }
          // Log error transitions
          if (prevStatus !== 'error' && nowError) {
            const errMsg = info.error || info.last_error || 'Unknown error';
            addLog(`${name} ERROR: ${errMsg.substring(0, 150)}`, 'e');
          }
          // Log when agent recovers from error
          if (prevStatus === 'error' && info.status === 'idle') {
            addLog(`${name} recovered from error`, 's');
          }
          // Log specific error types
          if (info.error_type === 'rate_limit') {
            addLog(`${name} RATE LIMIT — quota exceeded, wait a few minutes`, 'w');
          } else if (info.error_type === 'auth') {
            addLog(`${name} AUTH REQUIRED — login via SSH: ssh root@localhost -p 2222`, 'w');
          } else if (info.error_type === 'billing') {
            addLog(`${name} BILLING ERROR — check your Claude subscription`, 'w');
          } else if (info.error && (info.error.includes('not logged in') || info.error.includes('Not logged in') || info.error.includes('authentication'))) {
            addLog(`${name} AUTH REQUIRED — login via SSH: ssh root@localhost -p 2222`, 'w');
          } else if (info.error && (info.error.includes('rate') || info.error.includes('limit') || info.error.includes('429') || info.error.includes('quota') || info.error.includes('exceeded') || info.error.includes('capacity'))) {
            addLog(`${name} RATE LIMIT — ${info.error.substring(0, 100)}`, 'w');
          }

          // Speech bubbles from tool activity
          if (info.permission_wait) {
            ch.bubbleType = 'permission';
          } else if (info.waiting_tool) {
            ch.bubbleType = 'waiting';
            ch.bubbleTimer = BUBBLE_TIMER_MAX;
          } else if (nowError) {
            ch.bubbleType = 'error';
            ch.bubbleTimer = BUBBLE_TIMER_MAX;
          } else {
            if (ch.bubbleType === 'waiting') {
              ch.bubbleTimer -= 0.5; // fade out
              if (ch.bubbleTimer <= 0) ch.bubbleType = null;
            } else if (ch.bubbleType !== 'error') {
              ch.bubbleType = null;
            }
          }
        }
        document.getElementById('hud-active').textContent = `${activeCount}/${MAX_WORK_SEATS}`;
        // Show/hide error counter in HUD
        const errWrap = document.getElementById('hud-error-wrap');
        const errEl = document.getElementById('hud-errors');
        if (errorCount > 0) {
          errWrap.style.display = '';
          errEl.textContent = errorCount;
        } else {
          errWrap.style.display = 'none';
        }

        // ─── PROCESS SERVER-SIDE CHANGES ARRAY ───
        if (data.changes && data.changes.length > 0) {
          for (const change of data.changes) {
            switch (change.type) {
              case 'agent_status':
                if (change.to === 'error') {
                  addLog(`[STATUS] ${change.agent}: ${change.from} → ERROR`, 'e');
                } else if (change.from === 'error') {
                  addLog(`[STATUS] ${change.agent}: ERROR → ${change.to}`, 's');
                }
                break;
              case 'task_assigned':
                addLog(`[TASK] ${change.agent} assigned → ${change.task}`, 'i');
                break;
              case 'task_created':
                addLog(`[TASK] New: ${(change.task||change.task_id||'').substring(0,60)}`, 'i');
                break;
              case 'task_status_changed':
                if (change.to === 'done') {
                  addLog(`[TASK] ${change.task_id} completed ✓`, 's');
                } else if (change.from === 'working' && change.to === 'queue') {
                  addLog(`[TASK] ${change.task_id} returned to queue (failed?)`, 'w');
                } else {
                  addLog(`[TASK] ${change.task_id}: ${change.from} → ${change.to}`, 'i');
                }
                break;
              case 'skill_request_added':
                addLog(`[SKILL] ${change.count} new skill request(s)`, 'i');
                break;
              case 'cost_increase':
                addLog(`[COST] Alert: $${change.from} → $${change.to}`, 'w');
                break;
            }
          }
        }

        // Pipeline tasks
        if (data.pipeline) {
          const total = (data.pipeline.queue?.length||0)+(data.pipeline.working?.length||0)+
                        (data.pipeline.review?.length||0)+(data.pipeline.done?.length||0);
          const errTasks = [...(data.pipeline.queue||[]), ...(data.pipeline.working||[])]
            .filter(t => t.status === 'error' || t.error);
          document.getElementById('hud-tasks').textContent = total;
        }
        // Engine status — show ACTIVE when agents are working, IDLE when connected but no work, OFF if disconnected
        const hudDocker = document.getElementById('hud-docker');
        if (data.docker_available) {
          hudDocker.textContent = 'ACTIVE';
          hudDocker.style.color = '#4ADE80';
        } else {
          hudDocker.textContent = 'IDLE';
          hudDocker.style.color = '#FACC15';
        }
        updateAgentList();
        updateDetailPanel();
      }
    } catch(e) { addLog('WS parse error: ' + e.message, 'e'); }
  };

  ws.onclose = () => {
    wsConnected = false;
    document.getElementById('conn-badge').className = 'conn-badge off';
    document.getElementById('conn-badge').textContent = 'OFFLINE';
    addLog('Disconnected, reconnecting...', 'w');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => {};
}

// ═══════════════════════════════════════════════════════════════════
// UI — Sidebar
// ═══════════════════════════════════════════════════════════════════
function updateAgentList() {
  const el = document.getElementById('agent-list');
  el.innerHTML = AGENT_NAMES.map((name, i) => {
    const info = agentData[name] || {};
    const st = info.status || 'idle';
    const stCls = st === 'idle' ? 'st-idle' : st === 'working' || st === 'active' ? 'st-active' : st === 'error' ? 'st-error' : 'st-idle';
    const sel = selectedAgentName === name ? ' selected' : '';
    return `<div class="agent-row${sel}" onclick="selectAgent('${name}')">
      <div class="agent-swatch" style="background:${AGENT_COLORS[i]}"></div>
      <div class="agent-row-name">${name}</div>
      <div class="agent-row-status ${stCls}">${st.toUpperCase()}</div>
    </div>`;
  }).join('');
}

function selectAgent(name) {
  selectedAgentName = name;
  updateAgentList();
  updateDetailPanel();
}
window.selectAgent = selectAgent;

function updateDetailPanel() {
  const el = document.getElementById('detail-panel');
  if (!selectedAgentName) {
    el.innerHTML = '<div style="color:#555;font-size:10px;padding:20px 0;text-align:center;">Click an agent to inspect</div>';
    return;
  }
  const info = agentData[selectedAgentName] || {};
  const idx = AGENT_NAMES.indexOf(selectedAgentName);
  const ch = characters.get(idx);
  const skills = (info.skills || []).map(s => `<span class="skill-tag">${s}</span>`).join('');
  const isError = info.status === 'error';
  const statusColor = isError ? '#F87171' : (info.status === 'active' || info.status === 'working') ? '#4ADE80' : '#888';

  // Build error section if there's error info
  let errorSection = '';
  if (isError || info.error || info.last_error) {
    const errText = info.error || info.last_error || 'Unknown error';
    errorSection = `
      <div style="margin:6px 0;padding:6px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:4px;">
        <div style="font-size:9px;color:#F87171;font-weight:bold;margin-bottom:3px;">⚠ LAST ERROR</div>
        <div style="font-size:9px;color:#FCA5A5;word-break:break-word;max-height:80px;overflow-y:auto;">${escapeHtml(errText.substring(0, 500))}</div>
        ${info.completedAt ? `<div style="font-size:8px;color:#777;margin-top:3px;">${new Date(info.completedAt).toLocaleTimeString()}</div>` : ''}
      </div>
    `;
  }

  // Cost info
  let costSection = '';
  if (info.cost_summary && (info.cost_summary.cost > 0 || info.cost_summary.tokens > 0)) {
    costSection = `<div class="detail-field">Cost: <span>$${info.cost_summary.cost.toFixed(4)} (${info.cost_summary.tokens} tokens)</span></div>`;
  }

  el.innerHTML = `
    <div class="detail-title" style="color:${AGENT_COLORS[idx]}">${selectedAgentName.toUpperCase()}</div>
    <div class="detail-field">Status: <span style="color:${statusColor};font-weight:bold;">${(info.status||'idle').toUpperCase()}</span></div>
    <div class="detail-field">Task: <span>${info.task || 'None'}</span></div>
    <div class="detail-field">Room: <span>${info.room || '-'}</span></div>
    <div class="detail-field">Progress: <span>${info.progress || 0}%</span></div>
    <div class="detail-field">RAM: <span>${info.docker_mem || (info.ram_mb ? info.ram_mb+'MB' : '-')}</span></div>
    <div class="detail-field">CPU: <span>${info.docker_cpu_percent ? info.docker_cpu_percent.toFixed(1)+'%' : '-'}</span></div>
    <div class="detail-field">Container: <span style="color:${info.is_container_running ? '#4ADE80' : '#F87171'}">${info.is_container_running ? 'Running' : 'Stopped'}</span></div>
    <div class="detail-field">Position: <span>${ch ? `(${ch.tileCol},${ch.tileRow})` : '-'}</span></div>
    <div class="detail-field">State: <span>${ch ? ch.state : '-'}</span></div>
    ${costSection}
    ${errorSection}
    ${skills ? `<div class="detail-field">Skills:</div><div>${skills}</div>` : ''}
  `;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════════════
function gameLoop(timestamp) {
  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = Math.min((timestamp - lastFrameTime) / 1000, MAX_DT);
  lastFrameTime = timestamp;

  // Update characters
  for (const ch of characters.values()) ch.update(dt);

  // Update furniture animation timer
  furnAnimTimer += dt;

  // Update uptime
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const hh = String(Math.floor(elapsed/3600)).padStart(2,'0');
  const mm = String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
  const ss = String(elapsed%60).padStart(2,'0');
  document.getElementById('hud-uptime').textContent = `${hh}:${mm}:${ss}`;

  // Render — fit map perfectly within canvas-wrap area
  const canvas = document.getElementById('canvas');
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  renderFrame(ctx, canvas.width, canvas.height);

  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
async function init() {
  addLog('Starting Pixel Office Dashboard...', 'i');
  try {
    await loadAllAssets();
    addLog('Assets loaded, building grid...', 'i');
  } catch(e) {
    addLog('Asset loading error (continuing): ' + e.message, 'w');
    console.error('Asset load error:', e);
  }
  try {
    buildTileGrid();
    buildSeatsAndBlocked();
    initAgents();
    updateAgentList();
    addLog('Grid & agents ready', 's');
  } catch(e) {
    addLog('Grid/agent init error: ' + e.message, 'e');
    console.error('Grid init error:', e);
  }
  // Always try to connect WS and start rendering
  connectWS();
  requestAnimationFrame(gameLoop);
  addLog('Dashboard ready!', 's');
